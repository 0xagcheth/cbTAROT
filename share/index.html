<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>cbTARO Share Extension</title>
  
  <!-- Farcaster Mini App Embed -->
  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://0xagcheth.github.io/cbTARO/og.png","button":{"title":"Open cbTARO","action":{"type":"launch_frame","name":"cbTARO","url":"https://0xagcheth.github.io/cbTARO/","splashImageUrl":"https://0xagcheth.github.io/cbTARO/s.png","splashBackgroundColor":"#0b1020"}}}' />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-start: #0b1020;
      --bg-end: #1a2332;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --accent-start: #a78bfa;
      --accent-end: #ec4899;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .status.loading {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
    }
    
    .status.ready {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
    }
    
    .info {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .info-row:last-child { border-bottom: none; }
    
    .info-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-weight: 500;
    }
    
    .info-value {
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      text-align: right;
      max-width: 60%;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
      color: var(--text-primary);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
      box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(167, 139, 250, 0.4);
    }
    
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔮 cbTARO Share</h1>
    <p class="subtitle">Cast shared via Farcaster</p>
    
    <div id="status" class="status loading">Initializing...</div>
    
    <div class="info">
      <div class="info-row">
        <span class="info-label">Cast Hash:</span>
        <span class="info-value" id="castHash">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Cast FID:</span>
        <span class="info-value" id="castFid">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Viewer FID:</span>
        <span class="info-value" id="viewerFid">—</span>
      </div>
    </div>
    
    <a href="/cbTARO/" class="btn">✨ Back to cbTARO</a>
  </div>
  
  <!--
    Share Extension Implementation
    Docs: https://miniapps.farcaster.xyz/docs/guides/share-extension
  -->
  <script type="module">
    import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk@0.0.59';
    
    // Parse URL parameters (castHash, castFid, viewerFid)
    function getShareParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        castHash: params.get('castHash') || null,
        castFid: params.get('castFid') || null,
        viewerFid: params.get('viewerFid') || null
      };
    }
    
    // Display share context in UI
    function displayShareContext(params) {
      document.getElementById('castHash').textContent = params.castHash || 'N/A';
      document.getElementById('castFid').textContent = params.castFid || 'N/A';
      document.getElementById('viewerFid').textContent = params.viewerFid || 'N/A';
      
      // Store in sessionStorage for main app
      if (params.castHash || params.castFid || params.viewerFid) {
        const context = {
          castHash: params.castHash,
          castFid: params.castFid,
          viewerFid: params.viewerFid,
          timestamp: Date.now()
        };
        sessionStorage.setItem('cbtaro_share_context', JSON.stringify(context));
        console.log('[cbTARO share] Context stored:', context);
      }
    }
    
    // Call ready() if in Mini App (guarded)
    let readyCalled = false;
    async function callReady() {
      if (readyCalled) return false;
      readyCalled = true;
      
      try {
        if (!sdk?.actions?.ready) {
          console.warn('[cbTARO share] sdk.actions.ready not available');
          return false;
        }
        
        // Wait for UI render
        await new Promise(resolve => 
          requestAnimationFrame(() => requestAnimationFrame(resolve))
        );
        
        await sdk.actions.ready();
        console.log('[cbTARO share] ✅ ready() called');
        return true;
      } catch (err) {
        console.error('[cbTARO share] ready() failed:', err);
        return false;
      }
    }
    
    // Initialize
    async function init() {
      console.log('[cbTARO share] Initializing Share Extension...');
      const statusEl = document.getElementById('status');
      
      try {
        // 1. Parse and display params
        const params = getShareParams();
        displayShareContext(params);
        
        // 2. Detect environment
        let inMiniApp = false;
        if (typeof sdk?.isInMiniApp === 'function') {
          inMiniApp = await sdk.isInMiniApp();
          console.log('[cbTARO share] In Mini App:', inMiniApp);
        }
        
        // 3. Call ready() if in Mini App
        if (inMiniApp) {
          const readySuccess = await callReady();
          statusEl.textContent = readySuccess ? '✅ Ready' : '⚠️ Ready signal failed';
          statusEl.className = readySuccess ? 'status ready' : 'status loading';
        } else {
          statusEl.textContent = '🌐 Standalone mode';
          statusEl.className = 'status ready';
        }
        
        console.log('[cbTARO share] Initialization complete ✅');
        
      } catch (err) {
        console.error('[cbTARO share] Init error:', err);
        statusEl.textContent = '❌ Init failed';
      }
    }
    
    // Run
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
