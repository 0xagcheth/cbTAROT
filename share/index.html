<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>cbTARO Share Extension</title>
  
  <!-- Farcaster Mini App Embed -->
  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://0xagcheth.github.io/cbTARO/og.png","button":{"title":"Open cbTARO","action":{"type":"launch_frame","name":"cbTARO","url":"https://0xagcheth.github.io/cbTARO/","splashImageUrl":"https://0xagcheth.github.io/cbTARO/s.png","splashBackgroundColor":"#0b1020"}}}' />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0b1020 0%, #1a2332 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .info {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }
    
    .info-value {
      color: #fff;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }
    
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>cbTARO Share</h1>
    <p class="subtitle">Cast shared via Farcaster</p>
    
    <div class="info" id="shareInfo">
      <div class="info-row">
        <span class="info-label">Cast Hash:</span>
        <span class="info-value" id="castHash">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Cast FID:</span>
        <span class="info-value" id="castFid">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Viewer FID:</span>
        <span class="info-value" id="viewerFid">—</span>
      </div>
    </div>
    
    <a href="/cbTARO/" class="btn">Back to cbTARO</a>
  </div>
  
  <script type="module">
    // Import Farcaster SDK
    import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk@0.0.59';
    
    // Parse URL parameters
    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        castHash: params.get('castHash') || null,
        castFid: params.get('castFid') || null,
        viewerFid: params.get('viewerFid') || null
      };
    }
    
    // Display share context
    function displayShareContext(params) {
      document.getElementById('castHash').textContent = params.castHash || 'N/A';
      document.getElementById('castFid').textContent = params.castFid || 'N/A';
      document.getElementById('viewerFid').textContent = params.viewerFid || 'N/A';
      
      // Store in sessionStorage
      if (params.castHash || params.castFid || params.viewerFid) {
        sessionStorage.setItem('cbtaro_share_context', JSON.stringify(params));
        console.log('[cbTARO share] Context stored:', params);
      }
    }
    
    // Initialize
    async function init() {
      console.log('[cbTARO share] Initializing share extension...');
      
      // Display params
      const params = getParams();
      displayShareContext(params);
      
      // Call ready() if in Mini App
      try {
        if (typeof sdk?.isInMiniApp === 'function') {
          const inMiniApp = await sdk.isInMiniApp();
          console.log('[cbTARO share] In Mini App:', inMiniApp);
          
          if (inMiniApp && sdk?.actions?.ready) {
            // Wait for UI to render
            await new Promise(resolve => 
              requestAnimationFrame(() => requestAnimationFrame(resolve))
            );
            
            await sdk.actions.ready();
            console.log('[cbTARO share] ✅ ready() called');
          }
        }
      } catch (err) {
        console.error('[cbTARO share] Init error:', err);
      }
    }
    
    // Run on load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
