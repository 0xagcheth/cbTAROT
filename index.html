      let rafId = null;
      var isMobileView = function() { return window.matchMedia && window.matchMedia('(max-width: 768px)').matches; };
      function setVH() {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
        }
        rafId = requestAnimationFrame(() => {
          var vv = window.visualViewport;
          var mobile = isMobileView();
          var h;
          if (mobile) {
            h = window.innerHeight;
          } else {
            h = vv ? vv.height : window.innerHeight;
          }
          var el = document.activeElement;
          var isInput = el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
          if (isInput && vv && vv.height < window.innerHeight * 0.75) {
            rafId = null;
            return;
          }
          var vh = h * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
          rafId = null;
        });
      }
      setVH();
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', function() {
        setTimeout(setVH, 150);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          if (!isMobileView()) setVH();
        });
        window.visualViewport.addEventListener('scroll', function() {

      // ETH to wei(hex) converter (no libraries needed)
      function ethToWeiHex(ethStr) {
        const [whole, frac = ""] = String(ethStr).split(".");
        const fracPadded = (frac + "0".repeat(18)).slice(0, 18);

      // This function safely converts wei (BigInt) to ETH string without Number() conversion
      function weiToEthString(wei) {
        const weiStr = wei.toString();
        const len = weiStr.length;
        
        if (len <= 18) {
          // Less than 1 ETH
          const padded = weiStr.padStart(18, '0');
          const ethStr = '0.' + padded;
          // Remove trailing zeros
          return ethStr.replace(/\.?0+$/, '') || '0';
        } else {

          const fracPart = weiStr.slice(len - 18);
          const ethStr = intPart + '.' + fracPart;
          // Remove trailing zeros
          return ethStr.replace(/\.?0+$/, '');

      function getRandomCards(count){
        const arr=[...ALL_CARDS];
        for(let i=arr.length-1;i>0;i--){
          const j=Math.floor(Math.random()*(i+1));
          [arr[i],arr[j]]=[arr[j],arr[i]];
        }
        return arr.slice(0,count);
      }

      function pickWeighted(list) {
        const total=list.reduce((s,i)=>s+i.weight,0);
        let r=Math.random()*total;
        for (let i=0;i<list.length;i++){
          r-=list[i].weight;
          if (r<=0) return list[i];
        }
        return list[list.length-1];
      }

      function TaroApp() {
        const [gameStage, setGameStage]=useState("idle");

        const [oracleMessage, setOracleMessage]=useState("");

        useEffect(() => {

        useEffect(() => {

        // Single scroll reset for mobile: prevents layout shift

        // Run reset several times to override delayed scroll from browser/embed

        // Orb speaks only when asked: tap on orb or shake device (no auto-show)
        const triggerOracle=useCallback(() => {

          if(oracleHideTimerRef.current) clearTimeout(oracleHideTimerRef.current);
          if(oracleClearTimerRef.current) clearTimeout(oracleClearTimerRef.current);

        // Preload all card images once to prevent lag when revealing random cards
        useEffect(() => {

                img.decoding="async";
                img.fetchPriority="high";
                img.src=url;
              }, idx * 5); // tighter stagger for faster warmup
            });
          };

          // Start immediately; idle-callback fallback kept minimal to not delay preload
          let idleId;
          if (typeof requestIdleCallback === "function") {
            idleId=requestIdleCallback(preload, { timeout: 200 });
          } else {
            preload();
          }

          return () => {

        // Block body scroll when overlays/modals are open
        useEffect(() => {

          if (hasOverlay) {

          } else {

          }

            document.body.style.overflow = '';

        }, [showGallery, activeCard, aiInterpretation, showAiPanel]);

        // Farcaster Mini App: notify ready state after initial render (race-condition proof)
        useEffect(() => {
          let cancelled=false;
          (async () => {
            try {
              const sdk=await waitForFarcasterSdk(15000);
              if (!sdk || cancelled) return;
              if (window.__FC_READY_SENT__) return;
              window.__FC_READY_SENT__ = true;

              // wait a paint so UI exists
              await new Promise((resolve) => requestAnimationFrame(resolve));

              try {
                const context = await sdk.context;
                if (context?.user && !cancelled) {
                  const { fid, pfpUrl } = context.user;
                  setUserFid(fid);
                  setUserAvatarUrl(pfpUrl || "");
                }
              } catch (e) {
                console.warn("Failed to get user context:", e);
              }

              await sdk.actions.ready();
              if (!cancelled) setSdkReady(true);
              console.log("✅ Farcaster Mini App ready() sent");
            } catch (e) {
              console.warn("ready() pipeline failed:", e);
            }
          })();
          return () => { cancelled=true; };
        }, []);

        // Auto-detect wallet on mount (if already connected)
        useEffect(() => {
          (async () => {
            try {
              const provider = await getProvider();
              if (!provider) return;
              const accounts = await provider.request({ method: "eth_accounts" });
              const addr = accounts?.[0] || "";
              if (addr) setWalletAddress(addr);
            } catch (_) {}
          })();
        }, []);

        // Retry detect wallet once SDK ready (covers late SDK init)
        useEffect(() => {
          if (!sdkReady) return;
          (async () => {
            try {
              const provider = await getProvider();
              if (!provider) return;
              const accounts = await provider.request({ method: "eth_accounts" });
              const addr = accounts?.[0] || "";
              if (addr) setWalletAddress(addr);
            } catch (_) {}
          })();
        }, [sdkReady]);

        // Auto-hide payment error after delay
        useEffect(() => {
          if (payError) {
            if (payErrorTimerRef.current) clearTimeout(payErrorTimerRef.current);
            payErrorTimerRef.current = setTimeout(() => {
              setPayError("");
              payErrorTimerRef.current = null;

          }
          return () => {
            if (payErrorTimerRef.current) {
              clearTimeout(payErrorTimerRef.current);
              payErrorTimerRef.current = null;
            }
          };
        }, [payError]);

        // Pointer-driven fog parallax inside orb
        useEffect(() => {
          const el=document.getElementById("orbWrap");
          if (!el) return;

          const clamp=(v,a,b) => Math.max(a, Math.min(b, v));

          const onMove=(e) => {
            const r=el.getBoundingClientRect();
            const cx=(e.clientX - r.left)/r.width;
            const cy=(e.clientY - r.top)/r.height;
            const dx=clamp((cx - 0.5) * 2, -1, 1);
            const dy=clamp((cy - 0.5) * 2, -1, 1);
            el.style.setProperty("--fog-tx", `${dx * 10}px`);
            el.style.setProperty("--fog-ty", `${dy * 10}px`);
          };

          const onLeave=() => {
            el.style.setProperty("--fog-tx", "0px");
            el.style.setProperty("--fog-ty", "0px");
          };

          el.addEventListener("pointermove", onMove, { passive: true });
          el.addEventListener("pointerleave", onLeave, { passive: true });

          return () => {
            el.removeEventListener("pointermove", onMove);
            el.removeEventListener("pointerleave", onLeave);
          };
        }, []);

        // Shake-to-oracle for mobile devices
        useEffect(() => {
          let lastShake=0;
          let motionAttached=false;

          const handleMotion=(event) => {
            // Ignore shake when user is typing (prevents iOS "Shake to Undo")
            const activeEl = document.activeElement;
            const isTyping = activeEl && (activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'INPUT');
            if (isTyping) return;
            
            const acc=event?.accelerationIncludingGravity || event?.acceleration;
            if (!acc) return;
            const now=Date.now();
            const x=Math.abs(acc.x || 0);
            if (x > 12 && now - lastShake > 1200) { // quick left-right shake
              lastShake=now;
              triggerOracle();
            }
          };

          const attachMotion=() => {
            if (motionAttached) return;
            window.addEventListener("devicemotion", handleMotion, { passive: true });
            motionAttached=true;
          };

          const requestAndAttach=async () => {
            if (motionAttached) return;
            if (typeof window==="undefined" || typeof DeviceMotionEvent==="undefined") return;
            if (typeof DeviceMotionEvent.requestPermission==="function") {
              try {
                const res=await DeviceMotionEvent.requestPermission();
                if (res!=="granted") return;
              } catch (err) {
                console.warn("Device motion permission denied:", err);
                return;
              }
            }
            attachMotion();
          };

          // Try immediately (Android/desktop), and request on first gesture for iOS
          requestAndAttach();
          const onFirstGesture=() => requestAndAttach();
          window.addEventListener("touchend", onFirstGesture, { once:true });
          window.addEventListener("click", onFirstGesture, { once:true });

          return () => {
            if (motionAttached) {
              window.removeEventListener("devicemotion", handleMotion);
            }
            window.removeEventListener("touchend", onFirstGesture);
            window.removeEventListener("click", onFirstGesture);
          };
        }, [triggerOracle]);

        // Magical mist animation inside orb (smoke-like texture)
        useEffect(() => {
          if (!isMainScreen) return;

          const turbA=document.getElementById("mistTurbA");
          const turbB=document.getElementById("mistTurbB");
          const turbC=document.getElementById("mistTurbC");
          const layerA=document.getElementById("mistLayerA");
          const layerB=document.getElementById("mistLayerB");
          const layerC=document.getElementById("mistLayerC");
          if (!turbA || !turbB || !turbC || !layerA || !layerB || !layerC) return;

          let raf=0;

          const smoothNoise=(t, seed, speed=1, amp=1) => (
            Math.sin(t*speed + seed*0.7) +
            0.6*Math.sin(t*speed*0.47 + seed*1.1) +
            0.4*Math.sin(t*speed*0.23 + seed*1.9)
          ) * 0.5 * amp;

          const loop=(now) => {
            raf=requestAnimationFrame(loop);
            const tSec=now*0.001;

            const fxA=0.010 + smoothNoise(tSec, 1.1, 1.60, 0.0090);
            const fyA=0.0135 + smoothNoise(tSec, 2.2, 1.40, 0.0090);
            const fxB=0.0125 + smoothNoise(tSec, 3.7, 1.30, 0.0110);
            const fyB=0.0205 + smoothNoise(tSec, 4.4, 1.24, 0.0110);
            const fxC=0.0068 + smoothNoise(tSec, 5.9, 1.70, 0.0060);
            const fyC=0.0108 + smoothNoise(tSec, 6.6, 1.60, 0.0060);

            turbA.setAttribute("baseFrequency", `${fxA.toFixed(4)} ${fyA.toFixed(4)}`);
            turbB.setAttribute("baseFrequency", `${fxB.toFixed(4)} ${fyB.toFixed(4)}`);
            turbC.setAttribute("baseFrequency", `${fxC.toFixed(4)} ${fyC.toFixed(4)}`);

            layerA.style.setProperty("--mist-dx-a", `${smoothNoise(tSec, 8.1, 0.70, 24)}px`);
            layerA.style.setProperty("--mist-dy-a", `${smoothNoise(tSec, 9.2, 0.66, 24)}px`);
            layerB.style.setProperty("--mist-dx-b", `${smoothNoise(tSec, 10.4, 0.60, 34)}px`);
            layerB.style.setProperty("--mist-dy-b", `${smoothNoise(tSec, 11.6, 0.60, 34)}px`);
            layerC.style.setProperty("--mist-dx-c", `${smoothNoise(tSec, 12.8, 0.76, 20)}px`);
            layerC.style.setProperty("--mist-dy-c", `${smoothNoise(tSec, 13.9, 0.76, 20)}px`);
          };

          raf=requestAnimationFrame(loop);
          return () => cancelAnimationFrame(raf);
        }, [isMainScreen]);

        // Reset oracle state when leaving the main screen to avoid phantom messages
        useEffect(() => {
          if (isMainScreen) return;
          if(oracleHideTimerRef.current) clearTimeout(oracleHideTimerRef.current);
          if(oracleClearTimerRef.current) clearTimeout(oracleClearTimerRef.current);
          oracleHideTimerRef.current=null;
          oracleClearTimerRef.current=null;
          oracleBusyRef.current=false;
          setOracleBusy(false);
          setOracleVisible(false);
          setOracleMessage("");
        }, [isMainScreen]);


        // Subscribe to account changes to keep wallet auto-synced
        useEffect(() => {
          let mounted = true;
          let provider = null;

          const handleAccounts = (accounts = []) => {
            if (!mounted) return;
            const addr = accounts?.[0] || "";
            setWalletAddress(addr);
          };

          const syncAccounts = async () => {
            if (!provider?.request) return;
            try {
              const accounts = await provider.request({ method: "eth_accounts" });
              handleAccounts(accounts);
            } catch (_) {}
          };

          (async () => {
            provider = await getProvider();
            if (!provider || typeof provider.on !== "function") return;
            providerRef.current = provider;
            provider.on("accountsChanged", handleAccounts);
            provider.on("disconnect", handleAccounts);
            provider.on("connect", syncAccounts);
            await syncAccounts();
          })();

          return () => {
            mounted = false;
            const p = provider || providerRef.current;
            if (p?.removeListener) {
              p.removeListener("accountsChanged", handleAccounts);
              p.removeListener("disconnect", handleAccounts);
              p.removeListener("connect", syncAccounts);
            }
          };
        }, [sdkReady]);

        // Wallet helper functions
        function shorten(addr) {
          if (!addr || addr.length < 10) return addr || "";
          return addr.slice(0, 6) + "…" + addr.slice(-4);
        }

        // Wait for Farcaster SDK to load (fixes race condition)
        async function waitForFarcasterSdk(timeoutMs = 15000) {
          const start = Date.now();
          while (!window.__FC_SDK__) {
            if (Date.now() - start > timeoutMs) {
              console.warn("Farcaster SDK timeout after", timeoutMs, "ms");
              return null;
            }
            await new Promise(r => setTimeout(r, 50));
          }
          console.log("Farcaster SDK ready");
          return window.__FC_SDK__;
        }

        async function getProviderOrThrow() {
          // Wait for SDK to load if not ready
          const sdk = await waitForFarcasterSdk();
          
          if (!sdk?.wallet?.getEthereumProvider) {
            console.error("No wallet provider found. SDK state:", {
              sdkExists: !!sdk,
              hasWallet: !!sdk?.wallet,
              hasGetProvider: !!sdk?.wallet?.getEthereumProvider,
              hasWindowEthereum: !!window.ethereum
            });
            throw new Error("Farcaster SDK wallet not available");
          }

          const provider = await sdk.wallet.getEthereumProvider();
          console.log("Provider obtained from Farcaster SDK", {
            hasRequest: !!provider?.request,
            hasOn: !!provider?.on,
            providerType: provider?.constructor?.name || typeof provider
          });
          
          return provider;
        }

        async function getProvider() {
          try {
            return await getProviderOrThrow();
          } catch (e) {
            // Fallback for browser (MetaMask, etc.)
            if (window.ethereum?.request) {
              console.log("Provider obtained from window.ethereum (fallback)", {
                hasRequest: !!window.ethereum?.request
              });
              return window.ethereum;
            }
            console.error("getProvider failed:", e);
            return null;
          }
        }

        async function getAccountsSafe(provider) {
          setPaymentStep("accounts");
          
          // 1) First try without popup (check if already connected)
          try {
            const existing = await withTimeout(
              provider.request({ method: "eth_accounts" }),
              2500,
              "eth_accounts timeout"
            );
            if (existing?.[0]) {
              console.log("PAY: Already connected accounts:", existing);
              return existing;
            }
          } catch (e) {
            console.warn("PAY: eth_accounts check failed:", e);
          }

          // 2) Then request connection (popup)
          console.log("PAY: Requesting wallet connection...");
          return await withTimeout(
            provider.request({ method: "eth_requestAccounts" }),
            15000,
            "Wallet connect request timed out. Please try again."
          );
        }

        async function ensureChain(provider) {
          if (!REQUIRED_CHAIN_ID) return;
          
          const chainId = await provider.request({ method: "eth_chainId" });
          console.log("PAY: Current chainId:", chainId);
          
          if (chainId === REQUIRED_CHAIN_ID) return;

          console.log("PAY: Switching to required chain:", REQUIRED_CHAIN_ID);
          try {
            await provider.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: REQUIRED_CHAIN_ID }],
            });
            console.log("PAY: Chain switched");
          } catch (e) {
            console.warn("PAY: Chain switch failed, requesting manual switch", e);
            throw new Error("Переключите сеть кошелька на Base (chainId 0x2105) и попробуйте снова.");
          }
        }

        async function ensureEnoughBalance(provider, address, neededEth) {
          setPaymentStep("balance");
          
          const balHex = await provider.request({
            method: "eth_getBalance",
            params: [address, "latest"],
          });

          const balanceWei = BigInt(balHex);
          const neededWei = BigInt(ethToWeiHex(neededEth));
          
          // Safe conversion: BigInt -> string, no Number() conversion
          const balanceEth = weiToEthString(balanceWei);
          
          console.log("PAY: Balance check:", {
            balance: balanceEth + " ETH",
            needed: String(neededEth) + " ETH",
            enough: balanceWei >= neededWei,
            balanceWei: balanceWei.toString(),
            neededWei: neededWei.toString()
          });

          if (balanceWei < neededWei) {
            throw new Error("Insufficient balance.");
          }
        }

        async function connectWallet() {
          setWalletError("");
          setIsConnecting(true);
          try {
            const provider = await getProvider();
            if (!provider) throw new Error("No wallet provider available");

            const accounts = await provider.request({ method: "eth_requestAccounts" });
            const addr = accounts?.[0] || "";
            if (!addr) throw new Error("No accounts returned");
            setWalletAddress(addr);
            return addr;
          } catch (e) {
            const msg = e?.message || String(e);
            setWalletError(msg);
            return null;
          } finally {
            setIsConnecting(false);
          }
        }

        async function pay(ethAmount) {
          setPayError("");
          setIsPaying(true);
          setPaymentStep("");

          try {
            // Safety check: ensure ethAmount is string (not BigInt)
            if (typeof ethAmount === 'bigint') {
              console.warn("PAY: Received BigInt ethAmount, converting to string");
              ethAmount = weiToEthString(ethAmount);
            }
            // Normalize to string to avoid implicit Number conversions elsewhere
            ethAmount = String(ethAmount);
            
            console.log("PAY: 🚀 Starting payment for", ethAmount, "ETH", "(type:", typeof ethAmount, ")");

            // ---- Path A: Farcaster MiniApp native action (preferred) ----
            const sdk = await waitForFarcasterSdk();
            if (ENABLE_SEND_TOKEN && sdk?.actions?.sendToken) {
              setPaymentStep("sendToken");
              // Use precomputed wei when possible to avoid BigInt operations inside mobile runtimes
              const amountWei = PRICE_WEI_DEC[ethAmount] || ethToWeiString(ethAmount);
              console.log("PAY: Using Farcaster sendToken", { amountWei, to: PAYMENT_TO });
              const res = await sdk.actions.sendToken({
                token: "eip155:8453/native", // Base mainnet native ETH
                amount: amountWei,           // decimal string in wei
                recipientAddress: PAYMENT_TO
              });

              if (!res?.success) {
                const reason = res?.error?.message || res?.reason || res?.message || "sendToken failed";
                console.warn("PAY: sendToken returned failure", res);
                setPayError(`sendToken: ${reason}`);
                if (!ALLOW_PROVIDER_FALLBACK) throw new Error(reason);
                // else fall through to provider path
              } else {
                const txHash = res?.send?.transaction || "";
                setLastTx(txHash);
                setPaymentStep("complete");
                console.log("PAY: ✅ sendToken success", { txHash });
                return txHash;
              }

            const from = accounts?.[0];

            console.log("PAY: ✓ Connected account:", from);
            if (!walletAddress) setWalletAddress(from);

            // Step 3: Check/switch chain

            // Step 4: Check balance
            await ensureEnoughBalance(provider, from, ethAmount);
            console.log("PAY: ✓ Balance sufficient");

            // Step 5: Build and send transaction
            setPaymentStep("sendTx");
            // Use precomputed wei when possible to avoid unexpected BigInt coercions
            const valueWei = PRICE_WEI_HEX[ethAmount] || ethToWeiHex(ethAmount);
            
            // CRITICAL: Ensure all tx fields are strings (prevent BigInt leaks)
            const tx = {
              from: String(from),
              to: String(PAYMENT_TO),
              value: String(valueWei),
            };

            console.log("PAY: 💳 Sending transaction...", { 
              to: String(PAYMENT_TO), 
              ethAmount: String(ethAmount), 
              valueWei: String(valueWei) 
            });
            
            const txHash = await withTimeout(
              provider.request({
                method: "eth_sendTransaction",
                params: [tx],
              }),
              60000, // allow enough time for wallet confirmation
              "Transaction request timed out. Please try again."
            );

            if (!txHash) throw new Error("No transaction hash returned");
            
            console.log("PAY: ✓ Transaction sent! Hash:", txHash);
            setLastTx(txHash);

            // Step 6: Mark as complete immediately (skip waiting UI)
            setPaymentStep("complete");
            setIsPaying(false);
            return txHash;

            let errorMsg;

              errorMsg = "Payment failed";

button,.gallery-card,.card-anim,.taro-deck,.taro-button,.modal-back-btn,.sound-toggle-btn,.gallery-button,.custom-modal-btn,.taro-reading-close-btn,.gallery-close-btn,.custom-reading-overlay-button,.taro-option,.icon-btn{touch-action:manipulation;}

/* =========================
   GLASS SYSTEM (GLOBAL)
   ========================= */
:root{
  --glass-bg: rgba(20, 40, 80, 0.22);
  --glass-bg-strong: rgba(10, 18, 48, 0.35);
  --glass-border: rgba(255, 255, 255, 0.16);
  --glass-border-strong: rgba(255, 255, 255, 0.22);
  --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  --glass-inset: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.18);
  --glass-blur: 18px;
  --glass-sat: 1.15;
}
.glass{
  background: var(--glass-bg) !important;
  border: 1px solid var(--glass-border) !important;
  box-shadow: var(--glass-shadow), var(--glass-inset) !important;
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
}
.glass-strong{
  background: var(--glass-bg-strong) !important;
  border-color: var(--glass-border-strong) !important;
  backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(calc(var(--glass-sat) + 0.10)) !important;
  -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 6px)) saturate(calc(var(--glass-sat) + 0.10)) !important;
}
.no-glass{
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

/* =========================
   APPLY GLASS TO UI ELEMENTS
   ========================= */

/* Buttons / clickable UI */
.gallery-button,
.sound-toggle-btn,
.taro-button:not(.question-invoke-btn):not(.question-get-reading-btn),
.custom-modal-btn,
.taro-reading-close-btn,
.gallery-close-btn,
.modal-back-btn,
.custom-reading-overlay-button{
  background: var(--glass-bg) !important;
  border: 1px solid var(--glass-border) !important;
  box-shadow: var(--glass-shadow), var(--glass-inset) !important;
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
}

/* Hover polish (keep subtle, do not change layout) */
.gallery-button:hover,
.sound-toggle-btn:hover,
.taro-button:hover:not(.question-invoke-btn):not(.question-get-reading-btn),
.custom-modal-btn:hover:not(:disabled),
.taro-reading-close-btn:hover,
.gallery-close-btn:hover,
.custom-reading-overlay-button:hover:not(:disabled){
  background: rgba(255,255,255,0.06) !important;
  border-color: rgba(255,255,255,0.22) !important;
  transform: translateY(-1px);
}

/* Invoke button: fully transparent, no border, no hover glow */
button.taro-button.question-invoke-btn,
button.taro-button.question-invoke-btn:hover,
button.taro-button.question-invoke-btn:focus{
  background: transparent !important;
  border: none !important;
  border-color: transparent !important;
  outline: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  transform: none !important;
}
button.taro-button.question-invoke-btn:active{
  background: transparent !important;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  transform: scale(0.92) !important;
}
/* Get Reading button: same as Invoke — fully transparent, no border, no hover glow */
button.taro-button.question-get-reading-btn,
button.taro-button.question-get-reading-btn:hover,
button.taro-button.question-get-reading-btn:focus{
  background: transparent !important;
  border: none !important;
  border-color: transparent !important;
  outline: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  transform: none !important;
}
button.taro-button.question-get-reading-btn:active{
  background: transparent !important;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  transform: scale(0.92) !important;
}

/* Modals / panels */
.taro-modal,
.gallery-modal,
.taro-reading-panel{
  background: rgba(10, 18, 48, 0.28) !important;
  border: 1px solid rgba(255,255,255,0.14) !important;
  box-shadow: 0 20px 70px rgba(0,0,0,0.50), var(--glass-inset) !important;
  backdrop-filter: blur(calc(var(--glass-blur) + 8px)) saturate(calc(var(--glass-sat) + 0.12)) !important;
  -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 8px)) saturate(calc(var(--glass-sat) + 0.12)) !important;
}

/* Gallery card container stays glass, image stays unchanged */
.gallery-card{
  background: rgba(20, 30, 60, 0.18) !important;
  border: 1px solid rgba(255,255,255,0.10) !important;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25), var(--glass-inset) !important;
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
}
.gallery-card-info{
  background: rgba(10,15,35,0.55) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)) !important;
}

/* =========================

   ========================= */

/* Anything that is an asset-backed surface must not blur */
